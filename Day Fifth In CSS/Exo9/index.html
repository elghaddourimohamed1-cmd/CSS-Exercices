<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS exercises Exo9</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/8c87f55756.js" crossorigin="anonymous"></script>
</head>

<body>
    <header class="headersection">
        <!--todo navigation bar  -->
        <nav>
            <div class="logo">
                <h1><a href="index.html">SIDEGeek</a></h1>
            </div>
            <div class="navlist">
                <ul>
                    <li>Space & Coworking <i class="fa-solid fa-chevron-down"></i></li>
                    <li>Tech & Training <i class="fa-solid fa-chevron-down"></i></li>
                    <li>Ecosystem <i class="fa-solid fa-chevron-down"></i></li>
                    <li class="contactbtn"><a href="./contact-us.html">Contact</a></li>
                </ul>
            </div>
            <div class="rightbtn">
                <div class="lang"><i class="fa-solid fa-globe"></i>
                    <p>EN</p>
                </div>
                <!-- <button class="loginbtn">Log In / Join</button> -->
                <input class="loginbtn" type="submit" value="Log In / Join">
            </div>
        </nav>
    </header>
    <main>
        <section class="hero">
            <!--todo this is hero section  -->
            <div class="herodiv">
                <p class="firstp">Spaces & Membership</p>
                <p class="secondp"><span>Not just a space, Your </span><span class="bluecolor">international growth
                        network</p></span>
                <p class="thirdp">Do you have an account? <span class="bluecolor"><a href="">Sign in</a></span>, or
                    <span class="bluecolor"><a href="">Create one</a></span></p>
            </div>
            <div>
                <button class="reservebtn">Reserve A Space</button>
                <button class="tourbtn">First Time? Free Tour!</button>
            </div>
        </section>
        <section class="search">
            <!--todo search section  -->
            <div class="space-type">
                <div class="space-input">
                    <label for="types">Space type</label>
                    <div class="space-options">
                        <select class="select-options" name="types">
                            <option value="all-types">All types</option>
                            <i class="fa-solid fa-chevron-down"></i>
                        </select>
                    </div>
                </div>
            </div>
            <div class="location">
                <div class="location-input">
                    <label for="location">All locations</label>
                    <div class="location-options">
                        <select class="location">
                            <option value="all-locations">Locations</option>
                            <i class="fa-solid fa-chevron-down"></i>
                        </select>
                    </div>
                </div>
            </div>
            <div class="number-of-people">
                <div class="number-input">
                    <label for="number-of people">Number of people</label>
                    <div class="count">
                        <button class="minus-plus">-</button>
                        <input class="input-a-number" type="number" value="1">
                        <button class="minus-plus">+</button>
                    </div>
                    
                </div>
                
            </div>
            <div class="submit-search">
                    <input class="submit-search-btn" type="submit">
                </div>
        </section>
    </main>

</body>

</html>
